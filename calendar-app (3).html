<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyPal</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 2rem;
    border-bottom: 1px solid #d0d8e8;
    background: #ffffff;
  }

  .logo {
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    color: #1a5fb4;
    font-weight: normal;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
  }
  .logo span { color: #f0c030; font-weight: bold; }

  .add-btn {
    background: #f0c030;
    color: #1a1a2e;
    border: none;
    padding: 0.55rem 1.4rem;
    border-radius: 2px;
    font-size: 0.85rem;
    font-family: 'Georgia', serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s;
  }
  .add-btn:hover { background: #f5d050; }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 260px;
    min-width: 260px;
    background: #eef2f9;
    border-right: 1px solid #d0d8e8;
    padding: 1.5rem 1.25rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .sidebar h3 {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #7a8aaa;
    margin-bottom: 0.75rem;
    font-weight: normal;
    font-family: 'Georgia', serif;
  }

  .upcoming-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .upcoming-item {
    padding: 0.65rem 0.8rem;
    background: #ffffff;
    border-left: 3px solid #f0c030;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .upcoming-item:hover { background: #f0f4ff; }
  .upcoming-item .ev-title { font-size: 0.88rem; color: #1a1a2e; margin-bottom: 0.2rem; }
  .upcoming-item .ev-date { font-size: 0.74rem; color: #7a8aaa; }
  .upcoming-item .ev-deadline {
    font-size: 0.72rem;
    color: #e04040;
    font-weight: bold;
    margin-top: 0.25rem;
    letter-spacing: 0.02em;
  }

  .category-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .cat-item {
    display: flex; align-items: center; gap: 0.6rem;
    font-size: 0.85rem; color: #3a4a6a; padding: 0.3rem 0;
  }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .calendar-wrap {
    flex: 1;
    padding: 1.5rem 2rem;
    overflow: auto;
    background: #f5f7fa;
  }

  .fc {
    font-family: 'Georgia', serif;
    --fc-border-color: #d0d8e8;
    --fc-page-bg-color: transparent;
    --fc-neutral-bg-color: #eef2f9;
    --fc-list-event-hover-bg-color: #f0f4ff;
    --fc-today-bg-color: rgba(42,125,225,0.08);
    --fc-event-border-color: transparent;
    --fc-button-bg-color: #ffffff;
    --fc-button-border-color: #d0d8e8;
    --fc-button-text-color: #3a4a6a;
    --fc-button-hover-bg-color: #eef2f9;
    --fc-button-hover-border-color: #b0c0d8;
    --fc-button-active-bg-color: #2a7de1;
    --fc-button-active-border-color: #2a7de1;
  }
  .fc .fc-toolbar-title { font-size: 1.3rem; color: #1a1a2e; font-weight: normal; letter-spacing: 0.04em; }
  .fc .fc-col-header-cell-cushion { color: #7a8aaa; font-size: 0.8rem; text-decoration: none; }
  .fc .fc-daygrid-day-number { color: #3a4a6a; font-size: 0.8rem; text-decoration: none; }
  .fc .fc-day-today .fc-daygrid-day-number {
    background: #2a7de1; color: #ffffff; border-radius: 50%;
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  }
  .fc .fc-button {
    border-radius: 2px; font-size: 0.78rem; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 0.4rem 0.85rem; font-family: 'Georgia', serif;
  }
  .fc .fc-button:focus { box-shadow: none; }
  .fc .fc-button-primary:not(:disabled).fc-button-active { color: #ffffff; }
  .fc .fc-event { border-radius: 2px; font-size: 0.78rem; padding: 1px 5px; border: none; }
  .fc .fc-more-link { color: #7a8aaa; font-size: 0.75rem; }

  /* Color stripe bar under day number */
  .day-color-bar {
    display: flex;
    height: 5px;
    width: calc(100% - 8px);
    margin: 1px 4px 2px;
    overflow: hidden;
    border-radius: 3px;
    gap: 2px;
  }
  .day-color-bar span { flex: 1; display: block; border-radius: 2px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,20,50,0.6); z-index: 9999;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #ffffff; border: 1px solid #d0d8e8;
    border-radius: 4px; padding: 2rem;
    width: 440px; max-width: 95vw; box-sizing: border-box;
  }

  .modal h2 {
    font-size: 1.1rem; font-weight: normal;
    letter-spacing: 0.06em; color: #1a1a2e;
    margin-bottom: 1.5rem; text-transform: uppercase;
  }

  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block; font-size: 0.72rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: #7a8aaa; margin-bottom: 0.4rem;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%; max-width: 100%;
    background: #f5f7fa; border: 1px solid #d0d8e8;
    color: #1a1a2e; padding: 0.55rem 0.75rem;
    border-radius: 2px; font-size: 0.88rem;
    font-family: 'Georgia', serif; outline: none;
    transition: border-color 0.12s; box-sizing: border-box;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: #2a7de1; }
  .form-group select option { background: #ffffff; }

  .form-row {
    display: grid;
    grid-template-columns: minmax(0,1fr) minmax(0,1fr);
    gap: 0.75rem;
  }

  .reminder-block {
    background: #eef5ff;
    border: 1px solid #c0d4f0;
    border-radius: 3px;
    padding: 0.75rem 0.9rem;
    margin-bottom: 1rem;
  }
  .reminder-toggle {
    display: flex; align-items: center; gap: 0.65rem;
    cursor: pointer; font-size: 0.85rem; color: #3a4a6a; user-select: none;
  }
  .reminder-toggle input[type=checkbox] {
    accent-color: #2a7de1; width: 15px; height: 15px; cursor: pointer; flex-shrink: 0;
  }
  .reminder-options { margin-top: 0.75rem; display: none; }
  .reminder-options.visible { display: block; }
  .reminder-options label {
    font-size: 0.72rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: #7a8aaa; margin-bottom: 0.35rem; display: block;
  }
  .reminder-hint {
    font-size: 0.73rem; color: #5a7aaa; margin-top: 0.45rem; font-style: italic;
  }

  .modal-actions {
    display: flex; justify-content: flex-end;
    gap: 0.75rem; margin-top: 1.5rem;
  }

  .btn-cancel {
    background: transparent; border: 1px solid #d0d8e8; color: #7a8aaa;
    padding: 0.5rem 1.2rem; border-radius: 2px; font-family: 'Georgia', serif;
    font-size: 0.82rem; letter-spacing: 0.05em; cursor: pointer;
    text-transform: uppercase; transition: all 0.12s;
  }
  .btn-cancel:hover { color: #1a1a2e; border-color: #b0c0d8; }

  .btn-save {
    background: #f0c030; border: none; color: #1a1a2e;
    padding: 0.5rem 1.4rem; border-radius: 2px; font-family: 'Georgia', serif;
    font-size: 0.82rem; letter-spacing: 0.05em; cursor: pointer;
    text-transform: uppercase; transition: background 0.12s;
  }
  .btn-save:hover { background: #f5d050; }

  .btn-delete {
    background: transparent; border: 1px solid #e0a0a0; color: #cc3333;
    padding: 0.5rem 1rem; border-radius: 2px; font-family: 'Georgia', serif;
    font-size: 0.82rem; letter-spacing: 0.05em; cursor: pointer;
    text-transform: uppercase; transition: all 0.12s; margin-right: auto;
  }
  .btn-delete:hover { background: #fff0f0; }

  .empty-upcoming { font-size: 0.8rem; color: #a0b0c8; font-style: italic; }

  /* Eksāmenu poga un modāls */
  .header-links {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .link-btn {
    background: transparent;
    border: 1px solid #d0d8e8;
    color: #3a4a6a;
    padding: 0.45rem 0.9rem;
    border-radius: 2px;
    font-size: 0.78rem;
    font-family: 'Georgia', serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .link-btn:hover { background: #eef2f9; border-color: #b0c0d8; color: #1a1a2e; }
  .link-btn.eklase { border-color: #2a7de1; color: #2a7de1; }
  .link-btn.eklase:hover { background: #eef5ff; }
  .link-btn.uzdevumi { border-color: #e08020; color: #e08020; }
  .link-btn.uzdevumi:hover { background: #fff8ee; }

  .link-btn.maconis { border-color: #7a3abf; color: #7a3abf; }
  .link-btn.maconis:hover { background: #f5eeff; }
  .link-btn.soma { border-color: #2aaa60; color: #2aaa60; }
  .link-btn.soma:hover { background: #eefff5; }

  .exam-btn {
    background: transparent;
    border: 1px solid #2a7de1;
    color: #2a7de1;
    padding: 0.55rem 1.4rem;
    border-radius: 2px;
    font-size: 0.85rem;
    font-family: 'Georgia', serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-right: 0.75rem;
  }
  .exam-btn:hover { background: #2a7de1; color: #ffffff; }

  .exam-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 9999;
    align-items: center; justify-content: center;
  }
  .exam-modal-overlay.open { display: flex; }

  .exam-modal {
    background: #ffffff;
    border: 1px solid #d0d8e8;
    border-radius: 4px;
    padding: 1.5rem;
    max-width: 95vw;
    max-height: 90vh;
    overflow: auto;
    position: relative;
  }

  .exam-modal h2 {
    font-size: 1rem;
    font-weight: normal;
    letter-spacing: 0.1em;
    color: #1a5fb4;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .exam-modal img {
    max-width: 100%;
    border-radius: 3px;
    display: block;
  }

  .exam-close {
    position: absolute;
    top: 0.75rem; right: 0.75rem;
    background: transparent;
    border: 1px solid #d0d8e8;
    color: #7a8aaa;
    width: 30px; height: 30px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .exam-close:hover { color: #1a1a2e; border-color: #b0c0d8; }
</style>
</head>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">Jauni skolas darbi</h2>

    <div class="form-group">
      <label>Nosaukums</label>
      <input type="text" id="evTitle" placeholder="Darba nosaukums..." />
    </div>

    <div class="form-group">
      <label>Kategorija</label>
      <select id="evCategory">
        <option value="Kontroldarbi">Kontroldarbi</option>
        <option value="Mājasdarbi">Mājasdarbi</option>
        <option value="Testi">Testi</option>
        <option value="Mazie darbiņi">Mazie darbiņi</option>
        <option value="Konsultācijas">Konsultācijas</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Sākums</label>
        <input type="datetime-local" id="evStart" />
      </div>
      <div class="form-group">
        <label>Beigas / Termiņš</label>
        <input type="datetime-local" id="evEnd" />
      </div>
    </div>

    <div class="form-group">
      <label>Piezīmes</label>
      <textarea id="evNotes" rows="2" placeholder="Neobligātas piezīmes..."></textarea>
    </div>

    <div class="reminder-block">
      <label class="reminder-toggle">
        <input type="checkbox" id="reminderEnabled" onchange="toggleReminderOptions()" />
        Atgādināt par termiņu
      </label>
      <div class="reminder-options" id="reminderOptions">
        <label>Brīdināt pirms termiņa</label>
        <select id="reminderDays">
          <option value="1">1 dienu pirms</option>
          <option value="2">2 dienas pirms</option>
          <option value="3" selected>3 dienas pirms</option>
          <option value="5">5 dienas pirms</option>
          <option value="7">1 nedēļu pirms</option>
        </select>
        <div class="reminder-hint">Kad termiņš tuvojas, darba nosaukums parādīsies sarkans sānjoslā</div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="deleteBtn" style="display:none" onclick="deleteEvent()">Dzēst</button>
      <button class="btn-cancel" onclick="closeModal()">Atcelt</button>
      <button class="btn-save" onclick="saveEvent()">Saglabāt</button>
    </div>
  </div>
</div>

<script>
let calendar;
let editingEventId = null;

const CATEGORY_COLORS = {
  'Kontroldarbi':  '#e8c97a',
  'Mājasdarbi':    '#6ab0f5',
  'Testi':         '#7ec99a',
  'Mazie darbiņi': '#c47ad8',
  'Konsultācijas': '#f5813a'
};

const STORAGE_KEY = 'studypal_events';

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveEventsToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(events)); } catch(e) {}
}

let events = loadFromStorage();

function toLocalDatetimeStr(date) {
  const d = new Date(date);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function toggleReminderOptions() {
  const checked = document.getElementById('reminderEnabled').checked;
  document.getElementById('reminderOptions').classList.toggle('visible', checked);
}

function openAddModal(startStr, endStr) {
  editingEventId = null;
  document.getElementById('modalTitle').textContent = 'Jauni skolas darbi';
  document.getElementById('evTitle').value = '';
  document.getElementById('evNotes').value = '';
  document.getElementById('evStart').value = startStr || toLocalDatetimeStr(new Date());
  document.getElementById('evEnd').value = endStr || toLocalDatetimeStr(new Date(Date.now() + 3600000));
  document.getElementById('evCategory').value = 'Kontroldarbi';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('reminderEnabled').checked = false;
  document.getElementById('reminderOptions').classList.remove('visible');
  document.getElementById('reminderDays').value = '3';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('evTitle').focus(), 50);
}

function openEditModal(eventObj) {
  editingEventId = eventObj.id;
  document.getElementById('modalTitle').textContent = 'Rediģēt darbu';
  document.getElementById('evTitle').value = eventObj.title;
  document.getElementById('evNotes').value = eventObj.extendedProps?.notes || '';
  document.getElementById('evStart').value = toLocalDatetimeStr(eventObj.start);
  document.getElementById('evEnd').value = eventObj.end
    ? toLocalDatetimeStr(eventObj.end)
    : toLocalDatetimeStr(new Date(new Date(eventObj.start).getTime() + 3600000));
  document.getElementById('evCategory').value = eventObj.extendedProps?.category || 'Kontroldarbi';
  const rem = eventObj.extendedProps?.reminder;
  document.getElementById('reminderEnabled').checked = !!rem;
  document.getElementById('reminderDays').value = rem || '3';
  document.getElementById('reminderOptions').classList.toggle('visible', !!rem);
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { document.getElementById('evTitle').focus(); return; }
  const start    = document.getElementById('evStart').value;
  const end      = document.getElementById('evEnd').value;
  const notes    = document.getElementById('evNotes').value;
  const category = document.getElementById('evCategory').value;
  const color    = CATEGORY_COLORS[category] || '#e8c97a';
  const reminderEnabled = document.getElementById('reminderEnabled').checked;
  const reminder = reminderEnabled ? document.getElementById('reminderDays').value : null;
  const extendedProps = { notes, category, reminder };

  if (editingEventId) {
    const ev = calendar.getEventById(editingEventId);
    if (ev) {
      ev.setProp('title', title);
      ev.setStart(start);
      ev.setEnd(end);
      ev.setProp('backgroundColor', color);
      ev.setExtendedProp('notes', notes);
      ev.setExtendedProp('category', category);
      ev.setExtendedProp('reminder', reminder);
    }
    const idx = events.findIndex(e => e.id === editingEventId);
    if (idx > -1) events[idx] = { id: editingEventId, title, start, end, backgroundColor: color, extendedProps };
  } else {
    const id = 'ev_' + Date.now();
    const evObj = { id, title, start, end, backgroundColor: color, extendedProps };
    events.push(evObj);
    calendar.addEvent({ ...evObj, id });
  }

  saveEventsToStorage();
  setTimeout(updateDayCellColors, 60);
  updateUpcoming();
  closeModal();
}

function deleteEvent() {
  if (!editingEventId) return;
  const ev = calendar.getEventById(editingEventId);
  if (ev) ev.remove();
  events = events.filter(e => e.id !== editingEventId);
  saveEventsToStorage();
  setTimeout(updateDayCellColors, 60);
  updateUpcoming();
  closeModal();
}

/* ── Day color bars ── */
function buildDayColorMap() {
  const map = {};
  events.forEach(ev => {
    const key = ev.start.slice(0, 10);
    if (!map[key]) map[key] = [];
    const c = ev.backgroundColor || '#e8c97a';
    if (!map[key].includes(c)) map[key].push(c);
  });
  return map;
}

function updateDayCellColors() {
  const map = buildDayColorMap();
  document.querySelectorAll('.fc-daygrid-day').forEach(cell => {
    const dateStr = cell.getAttribute('data-date');
    const old = cell.querySelector('.day-color-bar');
    if (old) old.remove();

    const colors = map[dateStr];
    if (!colors || colors.length === 0) return;

    const bar = document.createElement('div');
    bar.className = 'day-color-bar';
    colors.forEach(c => {
      const s = document.createElement('span');
      s.style.background = c;
      bar.appendChild(s);
    });

    const frame = cell.querySelector('.fc-daygrid-day-frame');
    if (frame) {
      const top = frame.querySelector('.fc-daygrid-day-top');
      if (top) top.after(bar);
      else frame.prepend(bar);
    }
  });
}

/* ── Upcoming + deadline warnings ── */
function updateUpcoming() {
  const list = document.getElementById('upcomingList');
  const now  = new Date();

  const upcoming = events
    .filter(e => new Date(e.end || e.start) >= now)
    .sort((a,b) => new Date(a.end || a.start) - new Date(b.end || b.start))
    .slice(0, 8);

  if (!upcoming.length) {
    list.innerHTML = '<span class="empty-upcoming">Nav gaidāmu darbu</span>';
    return;
  }

  list.innerHTML = upcoming.map(ev => {
    const deadline = new Date(ev.end || ev.start);
    const color    = ev.backgroundColor || '#e8c97a';
    const dateStr  = deadline.toLocaleDateString('lv-LV', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

    let warningHtml = '';
    const reminder = ev.extendedProps?.reminder;
    if (reminder) {
      const daysLeft = Math.ceil((deadline - now) / (1000 * 60 * 60 * 24));
      if (daysLeft <= parseInt(reminder) && daysLeft >= 0) {
        const txt = daysLeft === 0
          ? '⚠ Šodien ir termiņš!'
          : daysLeft === 1
          ? '⚠ Rīt ir termiņš!'
          : `⚠ Termiņš pēc ${daysLeft} dienām!`;
        warningHtml = `<div class="ev-deadline">${txt}</div>`;
      }
    }

    return `<div class="upcoming-item" style="border-left-color:${color}" onclick="calendar.gotoDate('${ev.start}')">
      <div class="ev-title">${ev.title}</div>
      <div class="ev-date">${dateStr}</div>
      ${warningHtml}
    </div>`;
  }).join('');
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', function() {
  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'lv',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
    },
    buttonText: {
      today: 'Šodien',
      month: 'Mēnesis',
      week: 'Nedēļa',
      day: 'Diena',
      list: 'Saraksts'
    },
    height: 'auto',
    selectable: true,
    selectMirror: true,
    editable: true,
    events: events.map(e => ({ ...e })),

    select:      info => openAddModal(toLocalDatetimeStr(info.start), toLocalDatetimeStr(info.end)),
    eventClick:  info => openEditModal(info.event),

    eventDrop: info => {
      const ev = info.event;
      const idx = events.findIndex(e => e.id === ev.id);
      if (idx > -1) { events[idx].start = ev.startStr; events[idx].end = ev.endStr || ev.startStr; }
      saveEventsToStorage(); setTimeout(updateDayCellColors, 60); updateUpcoming();
    },
    eventResize: info => {
      const ev = info.event;
      const idx = events.findIndex(e => e.id === ev.id);
      if (idx > -1) events[idx].end = ev.endStr;
      saveEventsToStorage();
    },

    datesSet:      () => setTimeout(updateDayCellColors, 80),
    eventDidMount: () => setTimeout(updateDayCellColors, 80),
  });

  calendar.render();
  updateUpcoming();
  setTimeout(updateDayCellColors, 150);
});


function openExamModal() {
  document.getElementById('examModalOverlay').classList.add('open');
}
function closeExamModal() {
  document.getElementById('examModalOverlay').classList.remove('open');
}
function handleExamOverlayClick(e) {
  if (e.target === document.getElementById('examModalOverlay')) closeExamModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeExamModal(); } });
